<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#7B1FA2"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Calendar body -->
  <rect x="96" y="144" width="320" height="272" rx="24" fill="white" opacity="0.95"/>
  <!-- Calendar top bar -->
  <rect x="96" y="144" width="320" height="72" rx="24" fill="white"/>
  <rect x="96" y="180" width="320" height="36" fill="white"/>
  <!-- Calendar rings -->
  <rect x="176" y="120" width="16" height="56" rx="8" fill="white" opacity="0.9"/>
  <rect x="320" y="120" width="16" height="56" rx="8" fill="white" opacity="0.9"/>
  <!-- Calendar top accent -->
  <rect x="96" y="144" width="320" height="72" rx="24" fill="#1565C0" opacity="0.15"/>
  <rect x="96" y="180" width="320" height="36" fill="#1565C0" opacity="0.15"/>
  <!-- Number -->
  <text x="256" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="140" font-weight="800" fill="#1565C0" text-anchor="middle" dominant-baseline="central">42</text>
  <!-- "days" label -->
  <text x="256" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#888" text-anchor="middle">days left</text>
</svg>
