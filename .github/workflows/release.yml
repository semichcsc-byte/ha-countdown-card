name: Build & Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build

      # Copy to root for HACS
      - run: cp dist/countdown-card.js countdown-card.js
      - run: cp dist/countdown-timer-card.js countdown-timer-card.js

      # Only create release when pushing a tag
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/countdown-card.js
            dist/countdown-timer-card.js
          generate_release_notes: true
